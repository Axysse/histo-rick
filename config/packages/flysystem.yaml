flysystem:
    storages:
        default.storage:
            adapter: 'aws'
            options:
                client: 's3_client'
                bucket: '%env(S3_BUCKET)%'

services:
    s3_client:
        class: 'Aws\S3\S3Client'
        arguments:
            - endpoint: '%env(S3_ENDPOINT)%'
              region: '%env(S3_REGION)%'
              version: 'latest'
              credentials:
                  key: '%env(S3_KEY)%'
                  secret: '%env(S3_SECRET)%'
